groups:
  - name: hospital-core.rules
    interval: 30s
    rules:
      # ── Recording rules ────────────────────────────────────────────────────

      - record: job:http_requests_total:rate5m
        expr: rate(http_requests_total{job="hospital-core"}[5m])

      - record: hospital_core:availability:ratio5m
        expr: |
          sum(rate(http_requests_total{job="hospital-core",status_code!~"5.."}[5m]))
          /
          sum(rate(http_requests_total{job="hospital-core"}[5m]))

      - record: hospital_core:latency_p95:rate5m
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket{job="hospital-core"}[5m]))
            by (le)
          )

      - record: hospital_core:latency_p99:rate5m
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_request_duration_seconds_bucket{job="hospital-core"}[5m]))
            by (le)
          )

      # ── Alerting rules ─────────────────────────────────────────────────────

      - alert: HospitalCoreHighErrorRate
        expr: hospital_core:availability:ratio5m < 0.995
        for: 5m
        labels:
          severity: critical
          service: hospital-core
          team: platform
        annotations:
          summary: "Hospital Core error rate > 0.5%"
          description: >
            SLO violation: {{ $value | humanizePercentage }} availability
            (SLO target: 99.5%). Error budget is burning fast.
          runbook_url: "https://github.com/northcare-health/observability/blob/main/runbooks/hospital-core.md"

      - alert: HospitalCoreHighLatency
        expr: hospital_core:latency_p95:rate5m > 0.5
        for: 10m
        labels:
          severity: warning
          service: hospital-core
          team: platform
        annotations:
          summary: "Hospital Core p95 latency > 500ms"
          description: >
            p95 request latency is {{ $value | humanizeDuration }}.
            Investigate slow database queries or downstream service timeouts.
          runbook_url: "https://github.com/northcare-health/observability/blob/main/runbooks/hospital-core.md#latency"

      - alert: HospitalCoreCriticalLatency
        expr: hospital_core:latency_p99:rate5m > 2.0
        for: 5m
        labels:
          severity: critical
          service: hospital-core
          team: platform
        annotations:
          summary: "Hospital Core p99 latency > 2s"
          description: >
            p99 request latency has reached {{ $value | humanizeDuration }}.
            Patients are experiencing severe slowness.

      - alert: HospitalCorePodDown
        expr: kube_deployment_status_replicas_available{deployment="hospital-core", namespace="hospital"} == 0
        for: 1m
        labels:
          severity: page
          service: hospital-core
          team: platform
        annotations:
          summary: "Hospital Core has NO running pods"
          description: >
            All hospital-core pods are down in namespace 'hospital'.
            Immediate action required — service is completely unavailable.
          runbook_url: "https://github.com/northcare-health/observability/blob/main/runbooks/hospital-core.md#pod-down"

      - alert: HospitalCorePodRestarting
        expr: |
          increase(kube_pod_container_status_restarts_total{
            namespace="hospital",
            pod=~"hospital-core-.*"
          }[15m]) > 3
        for: 0m
        labels:
          severity: warning
          service: hospital-core
          team: platform
        annotations:
          summary: "Hospital Core pod restarting frequently"
          description: >
            Pod {{ $labels.pod }} has restarted {{ $value | humanize }} times
            in the last 15 minutes. Check OOMKill or crash loop.

      - alert: HospitalCoreHighMemory
        expr: |
          container_memory_working_set_bytes{
            namespace="hospital",
            container="hospital-core"
          } / container_spec_memory_limit_bytes{
            namespace="hospital",
            container="hospital-core"
          } > 0.85
        for: 10m
        labels:
          severity: warning
          service: hospital-core
          team: platform
        annotations:
          summary: "Hospital Core memory usage > 85% of limit"
          description: >
            Container {{ $labels.pod }} is using {{ $value | humanizePercentage }}
            of its memory limit. Risk of OOMKill.
