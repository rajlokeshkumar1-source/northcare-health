groups:
  - name: insurance.rules
    interval: 30s
    rules:
      - record: insurance:availability:ratio5m
        expr: |
          sum(rate(http_requests_total{job="insurance",status_code!~"5.."}[5m]))
          /
          sum(rate(http_requests_total{job="insurance"}[5m]))

      - record: insurance:latency_p95:rate5m
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket{job="insurance"}[5m]))
            by (le)
          )

      - alert: InsuranceHighErrorRate
        expr: insurance:availability:ratio5m < 0.995
        for: 5m
        labels:
          severity: critical
          service: insurance
          team: platform
        annotations:
          summary: "Insurance service error rate > 0.5%"
          description: >
            SLO violation: {{ $value | humanizePercentage }} availability.
            Eligibility checks and prior authorizations are failing.
          runbook_url: "https://github.com/northcare-health/observability/blob/main/runbooks/insurance.md"

      - alert: InsuranceEligibilityCheckTimeout
        expr: |
          rate(insurance_eligibility_checks_timeout_total[5m])
          /
          rate(insurance_eligibility_checks_total[5m]) > 0.10
        for: 5m
        labels:
          severity: warning
          service: insurance
          team: platform
        annotations:
          summary: "Insurance eligibility check timeout rate > 10%"
          description: >
            {{ $value | humanizePercentage }} of eligibility checks are timing out.
            Payer API may be degraded — check payer status pages.

      - alert: InsurancePodDown
        expr: kube_deployment_status_replicas_available{deployment="insurance", namespace="insurance"} == 0
        for: 1m
        labels:
          severity: page
          service: insurance
          team: platform
        annotations:
          summary: "Insurance service has no running pods"
          description: "Insurance verification is completely unavailable."

      - alert: InsuranceHighLatency
        expr: insurance:latency_p95:rate5m > 3.0
        for: 10m
        labels:
          severity: warning
          service: insurance
          team: platform
        annotations:
          summary: "Insurance p95 latency > 3s"
          description: >
            Eligibility checks are taking {{ $value | humanizeDuration }} at p95.
            Payer API round-trips may be slow.
