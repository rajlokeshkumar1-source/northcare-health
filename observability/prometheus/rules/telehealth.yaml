groups:
  - name: telehealth.rules
    interval: 30s
    rules:
      - record: telehealth:availability:ratio5m
        expr: |
          sum(rate(http_requests_total{job="telehealth",status_code!~"5.."}[5m]))
          /
          sum(rate(http_requests_total{job="telehealth"}[5m]))

      - record: telehealth:latency_p95:rate5m
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket{job="telehealth"}[5m]))
            by (le)
          )

      - alert: TelehealthHighErrorRate
        expr: telehealth:availability:ratio5m < 0.995
        for: 5m
        labels:
          severity: critical
          service: telehealth
          team: platform
        annotations:
          summary: "Telehealth error rate > 0.5%"
          description: "SLO violation: {{ $value | humanizePercentage }} availability. Active video sessions may be affected."
          runbook_url: "https://github.com/northcare-health/observability/blob/main/runbooks/telehealth.md"

      - alert: TelehealthHighLatency
        expr: telehealth:latency_p95:rate5m > 1.0
        for: 10m
        labels:
          severity: warning
          service: telehealth
          team: platform
        annotations:
          summary: "Telehealth p95 latency > 1s"
          description: "Video session signalling latency is {{ $value | humanizeDuration }}. Patient experience degraded."

      - alert: TelehealthPodDown
        expr: kube_deployment_status_replicas_available{deployment="telehealth", namespace="telehealth"} == 0
        for: 1m
        labels:
          severity: page
          service: telehealth
          team: platform
        annotations:
          summary: "Telehealth service has no running pods"
          description: "All telehealth pods are down — all video consultations are broken."

      - alert: TelehealthActiveSessionsDrop
        expr: |
          rate(telehealth_active_sessions_total[5m]) < 0
          and telehealth_active_sessions_total > 0
        for: 5m
        labels:
          severity: warning
          service: telehealth
          team: platform
        annotations:
          summary: "Telehealth active session count dropping unexpectedly"
          description: "Active video sessions dropped by {{ $value | humanize }} — may indicate connectivity issues."
