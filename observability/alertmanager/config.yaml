global:
  resolve_timeout: 5m
  # SMTP not used — all alerts go to GitHub Issues via webhook
  http_config:
    follow_redirects: true

templates: []

route:
  group_by: ['alertname', 'service', 'namespace']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: github-issues

  routes:
    # Page-severity alerts → GitHub issue immediately, no repeat delay
    - matchers:
        - name: severity
          value: page
      receiver: github-issues
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    # Critical alerts → GitHub issue with standard timing
    - matchers:
        - name: severity
          value: critical
      receiver: github-issues
      group_wait: 30s
      repeat_interval: 4h

    # Warning alerts → GitHub issue, longer repeat
    - matchers:
        - name: severity
          value: warning
      receiver: github-issues
      group_wait: 60s
      repeat_interval: 24h

receivers:
  - name: github-issues
    webhook_configs:
      - url: 'http://alertmanager-github-webhook.monitoring.svc.cluster.local:8080/webhook'
        send_resolved: true
        http_config:
          follow_redirects: true
        # Webhook payload will be forwarded to GitHub Issues API
        # Deploy alertmanager-github-webhook (https://github.com/m-mizutani/alertmanager-github-issues)
        # with GITHUB_TOKEN secret and repo configured

  - name: 'null'
    # Catch-all no-op receiver for silenced alerts

inhibit_rules:
  # If a 'page' alert fires for a service, suppress 'critical' for the same service
  - source_matchers:
      - name: severity
        value: page
    target_matchers:
      - name: severity
        value: critical
    equal: ['alertname', 'service']

  # If a 'critical' alert fires, suppress 'warning' for the same service
  - source_matchers:
      - name: severity
        value: critical
    target_matchers:
      - name: severity
        value: warning
    equal: ['service']

  # If a pod is down, suppress latency/error-rate alerts for the same service
  - source_matchers:
      - alertname: =~ ".*PodDown"
    target_matchers:
      - alertname: =~ ".*(HighErrorRate|HighLatency|SlowBurn|FastBurn)"
    equal: ['service']
