---
# Jenkins Configuration as Code (JCasC)
# Applied on startup via CASC_JENKINS_CONFIG env var pointing to this file.
# Secrets are injected via environment variables — never stored here.

jenkins:
  systemMessage: "NorthCare CI Server — Managed by JCasC. Do not configure through the UI."
  numExecutors: 0  # Master runs no jobs — all work on agents

  agentProtocols:
    - "JNLP4-connect"

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: admin
          name: "Admin"
          password: "${JENKINS_ADMIN_PASSWORD}"

  authorizationStrategy:
    roleBased:
      roles:
        global:
          - name: admin
            description: "Full administrative access"
            permissions:
              - "Overall/Administer"
            entries:
              - user: admin

  remotingSecurity:
    enabled: true

credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              id: ecr-registry
              description: "AWS ECR Registry URL (e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com)"
              secret: "${ECR_REGISTRY_URL}"
              scope: GLOBAL
          - usernamePassword:
              id: github-creds
              username: northcare-bot
              password: "${GITHUB_TOKEN}"
              description: "GitHub PAT for repo access and GitOps updates"
              scope: GLOBAL
          - string:
              id: aws-account-id
              description: "AWS Account ID for ECR image paths"
              secret: "${AWS_ACCOUNT_ID}"
              scope: GLOBAL

tool:
  git:
    installations:
      - name: Default
        home: git
  docker:
    installations:
      - name: docker
        home: /usr/bin

unclassified:
  globalLibraries:
    libraries:
      - name: northcare-pipeline
        defaultVersion: main
        implicit: true
        allowVersionOverride: false
        retriever:
          modernSCM:
            scm:
              git:
                remote: https://github.com/northcare-health/jenkins-config
                credentialsId: github-creds
                traits:
                  - gitBranchDiscovery

  location:
    url: "http://jenkins.northcare-health.internal:8080"
    adminAddress: "platform@northcare-health.com"

  timestamper:
    allPipelines: true

  buildDiscarders:
    configuredBuildDiscarders:
      - "jobBuildDiscarder":
          discarder:
            logRotator:
              numToKeepStr: "30"
              artifactNumToKeepStr: "10"

jobs:
  - script: |
      def services = ['hospital-core', 'telehealth', 'billing', 'insurance', 'notifications']
      services.each { svc ->
        multibranchPipelineJob(svc) {
          displayName("NorthCare :: ${svc}")
          description("CI pipeline for ${svc} service")
          branchSources {
            github {
              id("${svc}-source")
              scanCredentialsId('github-creds')
              repoOwner('northcare-health')
              repository("service-${svc}")
              traits {
                gitHubBranchDiscovery { strategyId(1) }
                gitHubPullRequestDiscovery { strategyId(1) }
              }
            }
          }
          factory {
            workflowBranchProjectFactory {
              scriptPath('Jenkinsfile')
            }
          }
          orphanedItemStrategy {
            discardOldItems {
              numToKeep(10)
            }
          }
          triggers {
            periodic(5)  // poll every 5 minutes as webhook fallback
          }
        }
      }
