server:
  port: 8083

spring:
  application:
    name: insurance

  datasource:
    url: jdbc:postgresql://localhost:5432/northcare_insurance
    username: ${DB_USERNAME:northcare}
    password: ${DB_PASSWORD:northcare}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      service: insurance

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  default-produces-media-type: application/json

logging:
  level:
    com.northcare.insurance: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN

eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_SERVICE_URL:http://eureka-admin:northcare-eureka-2025@service-discovery.discovery.svc.cluster.local:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.cloud.client.ip-address:localhost}:${server.port}
    health-check-url-path: /actuator/health
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    metadata-map:
      namespace: insurance
      version: ${APP_VERSION:1.0.0}
      environment: ${ENVIRONMENT:dev}

