{{/*
northcare.serviceaccount — ServiceAccount manifest.
Rendered only when serviceAccount.create=true.
Consumer charts call: {{ include "northcare.serviceaccount" . }}
*/}}
{{- define "northcare.serviceaccount" -}}
{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "northcare.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "northcare.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
{{- end }}
