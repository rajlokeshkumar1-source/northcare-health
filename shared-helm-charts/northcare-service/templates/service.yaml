{{/*
northcare.service — ClusterIP Service manifest.
Consumer charts call: {{ include "northcare.service" . }}
*/}}
{{- define "northcare.service" -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "northcare.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "northcare.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: {{ .Values.service.protocol }}
      name: http
  selector:
    {{- include "northcare.selectorLabels" . | nindent 4 }}
{{- end }}
