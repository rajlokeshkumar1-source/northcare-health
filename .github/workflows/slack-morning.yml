name: Slack Morning Check-in

on:
  schedule:
    - cron: '0 14 * * 1-5'   # 10am EDT (14:00 UTC) weekdays
  workflow_dispatch:

jobs:
  morning-checkin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: slack-agent/requirements.txt

      - name: Install dependencies
        run: pip install -r slack-agent/requirements.txt

      - name: Run morning check-in
        working-directory: slack-agent/agent
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          MITHRA_SLACK_USER_ID: ${{ secrets.MITHRA_SLACK_USER_ID }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          GH_MODELS_API_KEY: ${{ secrets.GH_MODELS_API_KEY }}
        run: python morning_checkin.py
