spring:
  application:
    name: notifications

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/northcare_notifications}
    username: ${DB_USERNAME:northcare}
    password: ${DB_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: 8084
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      service: notifications

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.northcare.notifications: DEBUG
    org.flywaydb: INFO

northcare:
  notifications:
    retry-delay-ms: 300000
    scheduled-poll-ms: 60000

eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_SERVICE_URL:http://eureka-admin:northcare-eureka-2025@service-discovery.discovery.svc.cluster.local:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.cloud.client.ip-address:localhost}:${server.port}
    health-check-url-path: /actuator/health
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    metadata-map:
      namespace: notifs
      version: ${APP_VERSION:1.0.0}
      environment: ${ENVIRONMENT:dev}

