apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: hospital-core-db-creds
  namespace: hospital
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-store
    kind: ClusterSecretStore
  target:
    name: hospital-core-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: northcare/dev/hospital-core/db
        property: database_url
    - secretKey: DB_PASSWORD
      remoteRef:
        key: northcare/dev/hospital-core/db
        property: password
