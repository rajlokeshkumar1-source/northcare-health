image:
  repository: <AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/northcare/billing
  tag: "latest"  # Updated by Jenkins on each deploy
  pullPolicy: Always

replicaCount: 1

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/northcare-billing-irsa

env:
  ENVIRONMENT: dev
  SERVICE_NAME: billing
  AWS_REGION: us-east-1
  LOG_LEVEL: DEBUG
  PAYMENT_GATEWAY: stripe
  CLAIMS_BATCH_SIZE: "100"

envFrom:
  - secretRef:
      name: billing-secrets

hpa:
  enabled: false

externalSecret:
  enabled: true
  secretStoreRef: aws-secrets-store
  target: billing-secrets
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: northcare/dev/billing/db
        property: database_url
    - secretKey: DB_PASSWORD
      remoteRef:
        key: northcare/dev/billing/db
        property: password
    - secretKey: STRIPE_SECRET_KEY
      remoteRef:
        key: northcare/dev/billing/payments
        property: stripe_secret_key
