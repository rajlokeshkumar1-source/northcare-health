image:
  repository: <AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/northcare/service-discovery
  tag: "latest"

replicaCount: 1

namespace: discovery

env:
  ENVIRONMENT: dev
  EUREKA_HOSTNAME: service-discovery.discovery.svc.cluster.local
  EUREKA_SELF_PRESERVATION: "false"

externalSecret:
  enabled: true
  secretStoreRef: aws-secrets-store
  target: eureka-credentials
  data:
    - secretKey: EUREKA_ADMIN_USERNAME
      remoteRef:
        key: northcare/dev/eureka
        property: username
    - secretKey: EUREKA_ADMIN_PASSWORD
      remoteRef:
        key: northcare/dev/eureka
        property: password
