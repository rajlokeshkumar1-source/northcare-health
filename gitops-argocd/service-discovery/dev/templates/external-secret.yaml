apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: eureka-credentials
  namespace: discovery
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-store
    kind: ClusterSecretStore
  target:
    name: eureka-credentials
    creationPolicy: Owner
  data:
    - secretKey: EUREKA_ADMIN_USERNAME
      remoteRef:
        key: northcare/dev/eureka
        property: username
    - secretKey: EUREKA_ADMIN_PASSWORD
      remoteRef:
        key: northcare/dev/eureka
        property: password
