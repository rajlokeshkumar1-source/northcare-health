image:
  repository: <AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/northcare/notifications
  tag: "latest"  # Updated by Jenkins on each deploy
  pullPolicy: Always

replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/northcare-notifications-irsa

env:
  ENVIRONMENT: dev
  SERVICE_NAME: notifications
  AWS_REGION: us-east-1
  LOG_LEVEL: DEBUG
  EMAIL_FROM: noreply@northcare-health.com
  SMS_PROVIDER: twilio

envFrom:
  - secretRef:
      name: notifications-secrets

hpa:
  enabled: false

externalSecret:
  enabled: true
  secretStoreRef: aws-secrets-store
  target: notifications-secrets
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: northcare/dev/notifications/db
        property: database_url
    - secretKey: DB_PASSWORD
      remoteRef:
        key: northcare/dev/notifications/db
        property: password
    - secretKey: TWILIO_AUTH_TOKEN
      remoteRef:
        key: northcare/dev/notifications/twilio
        property: auth_token
    - secretKey: TWILIO_ACCOUNT_SID
      remoteRef:
        key: northcare/dev/notifications/twilio
        property: account_sid
    - secretKey: SES_SMTP_PASSWORD
      remoteRef:
        key: northcare/dev/notifications/ses
        property: smtp_password
