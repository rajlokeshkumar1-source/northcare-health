apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  annotations:
    # Manual sync — changes to monitoring stack require deliberate operator action
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: northcare
  source:
    repoURL: https://github.com/northcare-health/gitops-argocd
    targetRevision: HEAD
    path: monitoring
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    # No automated sync — monitoring stack changes are reviewed and synced manually
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
