apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ui-portal
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: northcare
  source:
    repoURL: https://github.com/northcare-health/gitops-argocd
    targetRevision: HEAD
    path: ui-portal/dev
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: ui
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
