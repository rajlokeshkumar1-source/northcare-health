kube-prometheus-stack:
  enabled: true

  # Prometheus configuration
  prometheus:
    prometheusSpec:
      retention: 15d
      retentionSize: "40GB"
      replicas: 1
      scrapeInterval: 30s
      evaluationInterval: 30s
      # Auto-discover PrometheusRules from all namespaces
      ruleSelector: {}
      ruleSelectorNilUsesHelmValues: false
      serviceMonitorSelector: {}
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelector: {}
      podMonitorSelectorNilUsesHelmValues: false
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 2000m
          memory: 4Gi
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: gp3
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi
      additionalScrapeConfigs:
        - job_name: northcare-services
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
              action: keep
              regex: "true"
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
              action: replace
              target_label: __metrics_path__
              regex: (.+)
            - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
              action: replace
              regex: ([^:]+)(?::\d+)?;(\d+)
              replacement: $1:$2
              target_label: __address__
            - source_labels: [__meta_kubernetes_namespace]
              target_label: namespace
            - source_labels: [__meta_kubernetes_pod_name]
              target_label: pod

  # Alertmanager configuration
  alertmanager:
    enabled: true
    alertmanagerSpec:
      replicas: 1
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: gp3
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi
    config:
      global:
        resolve_timeout: 5m
      route:
        group_by: ['alertname', 'service', 'namespace']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: github-issues
        routes:
          - matchers:
              - name: severity
                value: page
            receiver: github-issues
            continue: true
          - matchers:
              - name: severity
                value: critical
            receiver: github-issues
      receivers:
        - name: github-issues
          webhook_configs:
            - url: 'http://alertmanager-github-webhook.monitoring.svc.cluster.local:8080/webhook'
              send_resolved: true
      inhibit_rules:
        - source_matchers:
            - severity = page
          target_matchers:
            - severity = critical
          equal: ['alertname', 'service']

  # Grafana configuration
  grafana:
    enabled: true
    adminPassword: "${GRAFANA_ADMIN_PASSWORD}"
    replicas: 1
    persistence:
      enabled: true
      storageClassName: gp3
      size: 10Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    # Sidecar picks up ConfigMaps labelled grafana_dashboard: "1"
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        searchNamespace: ALL
        folder: /var/lib/grafana/dashboards/northcare
      datasources:
        enabled: true
    grafana.ini:
      server:
        root_url: "https://grafana.northcare-health.internal"
      auth.anonymous:
        enabled: false
      security:
        allow_embedding: false
        cookie_secure: true
      log:
        mode: console
        level: warn
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            url: http://{{ .Release.Name }}-prometheus-prometheus.monitoring.svc.cluster.local:9090
            isDefault: true
            access: proxy
            jsonData:
              timeInterval: 30s

  # Node exporter
  nodeExporter:
    enabled: true

  # kube-state-metrics
  kubeStateMetrics:
    enabled: true

  # Default alert rules — disable ones replaced by our custom SLO rules
  defaultRules:
    create: true
    rules:
      alertmanager: true
      etcd: true
      configReloaders: true
      general: true
      kubeApiserverAvailability: true
      kubeApiserverBurnrate: true
      kubeApiserverHistogram: true
      kubeApiserverSlos: true
      kubeControllerManager: true
      kubelet: true
      kubeProxy: true
      kubePrometheusGeneral: true
      kubePrometheusNodeRecording: true
      kubernetesApps: true
      kubernetesResources: true
      kubernetesStorage: true
      kubernetesSystem: true
      kubeSchedulerAlerting: true
      kubeSchedulerRecording: true
      kubeStateMetrics: true
      network: true
      node: true
      nodeExporterAlerting: true
      nodeExporterRecording: true
      prometheus: true
      prometheusOperator: true
