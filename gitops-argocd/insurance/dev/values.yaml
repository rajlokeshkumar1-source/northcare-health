image:
  repository: <AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/northcare/insurance
  tag: "latest"  # Updated by Jenkins on each deploy
  pullPolicy: Always

replicaCount: 1

resources:
  requests:
    cpu: 150m
    memory: 256Mi
  limits:
    cpu: 750m
    memory: 512Mi

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/northcare-insurance-irsa

env:
  ENVIRONMENT: dev
  SERVICE_NAME: insurance
  AWS_REGION: us-east-1
  LOG_LEVEL: DEBUG
  ELIGIBILITY_CHECK_TIMEOUT_SECONDS: "30"
  SUPPORTED_PAYERS: "aetna,cigna,bluecross,unitedhealth"

envFrom:
  - secretRef:
      name: insurance-secrets

hpa:
  enabled: false

externalSecret:
  enabled: true
  secretStoreRef: aws-secrets-store
  target: insurance-secrets
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: northcare/dev/insurance/db
        property: database_url
    - secretKey: DB_PASSWORD
      remoteRef:
        key: northcare/dev/insurance/db
        property: password
    - secretKey: PAYER_API_KEY
      remoteRef:
        key: northcare/dev/insurance/payer
        property: api_key
