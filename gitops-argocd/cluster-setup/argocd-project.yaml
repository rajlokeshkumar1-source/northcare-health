apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: northcare
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
  finalizers:
    - resources-finalizer.argocd.io
spec:
  description: "NorthCare Enterprise Health Platform — all microservices and monitoring"

  sourceRepos:
    - https://github.com/northcare-health/gitops-argocd
    - https://northcare-health.github.io/shared-helm-charts
    - https://prometheus-community.github.io/helm-charts
    - https://grafana.github.io/helm-charts

  destinations:
    - namespace: hospital
      server: https://kubernetes.default.svc
    - namespace: telehealth
      server: https://kubernetes.default.svc
    - namespace: billing
      server: https://kubernetes.default.svc
    - namespace: insurance
      server: https://kubernetes.default.svc
    - namespace: notifs
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: external-secrets
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: "external-secrets.io"
      kind: ClusterSecretStore
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRole
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRoleBinding
    - group: "admissionregistration.k8s.io"
      kind: MutatingWebhookConfiguration
    - group: "admissionregistration.k8s.io"
      kind: ValidatingWebhookConfiguration
    - group: "apiextensions.k8s.io"
      kind: CustomResourceDefinition

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  roles:
    - name: ci-read-sync
      description: Jenkins CI — allowed to trigger sync and read app status
      policies:
        - p, proj:northcare:ci-read-sync, applications, sync, northcare/*, allow
        - p, proj:northcare:ci-read-sync, applications, get, northcare/*, allow
        - p, proj:northcare:ci-read-sync, applications, action/*, northcare/*, allow
      jwtTokens:
        - iat: 1700000000
