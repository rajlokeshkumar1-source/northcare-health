spring:
  application:
    name: hospital-core
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/northcare_hospital}
    username: ${DB_USERNAME:northcare}
    password: ${DB_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      pool-name: NorthCareHikariPool
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 20
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: 8080
  compression:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha

northcare:
  encryption:
    key: ${ENCRYPTION_KEY:default-dev-key-change-in-prod}
  aws:
    region: ${AWS_REGION:us-east-1}
    db-secret-name: ${NORTHCARE_DB_SECRET_NAME:}

logging:
  level:
    com.northcare: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_SERVICE_URL:http://eureka-admin:northcare-eureka-2025@service-discovery.discovery.svc.cluster.local:8761/eureka/}
  instance:
    # Use pod IP so Eureka shows the real pod (not service IP)
    prefer-ip-address: true
    # Instance ID = appname:podIP:port → unique per pod
    instance-id: ${spring.application.name}:${spring.cloud.client.ip-address:localhost}:${server.port}
    health-check-url-path: /actuator/health
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    metadata-map:
      namespace: hospital
      version: ${APP_VERSION:1.0.0}
      environment: ${ENVIRONMENT:dev}

